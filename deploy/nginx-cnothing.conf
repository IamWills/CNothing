# CNothing / cnothing.com — reverse proxy to Bun on 127.0.0.1:3021
# Install: ln -sf /etc/nginx/sites-available/cnothing.com /etc/nginx/sites-enabled/
# After HTTP works: certbot --nginx -d cnothing.com -d www.cnothing.com -d ai.cnothing.com

server {
    listen 80;
    listen [::]:80;
    server_name cnothing.com www.cnothing.com ai.cnothing.com;

    location / {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }
}
